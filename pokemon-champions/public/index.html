<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokémon Champions — Resource Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #2a2f3d;
    --accent: #f7c948;
    --accent2: #e05a2b;
    --blue: #4fc3f7;
    --green: #69f0ae;
    --red: #ff5252;
    --purple: #ce93d8;
    --text: #e8eaf0;
    --muted: #6b7280;
    --hp: #ff5252;
    --atk: #ff9800;
    --def: #4caf50;
    --spatk: #2196f3;
    --spdef: #9c27b0;
    --spe: #ffeb3b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    background: linear-gradient(135deg, #0d1117 0%, #161b2e 50%, #0d1117 100%);
    border-bottom: 2px solid var(--accent);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(247,201,72,0.15);
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--accent); line-height: 1; }
  .logo span { font-size: 0.65rem; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; display: block; margin-top: -2px; }
  .header-meta { font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--muted); text-align: right; }
  .header-meta strong { color: var(--accent); }
  .app-layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 64px); }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-search { padding: 1rem; border-bottom: 1px solid var(--border); }
  .search-box { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; font-weight: 500; outline: none; transition: border-color 0.2s; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }
  .filter-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .type-filter { padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Rajdhani', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .type-filter:hover { border-color: var(--accent); color: var(--accent); }
  .type-filter.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .pokemon-count { padding: 6px 1rem; font-size: 0.72rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-family: 'Share Tech Mono', monospace; border-bottom: 1px solid var(--border); }
  .pokemon-list { overflow-y: auto; flex: 1; }
  .pokemon-list::-webkit-scrollbar { width: 4px; }
  .pokemon-list::-webkit-scrollbar-track { background: transparent; }
  .pokemon-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .pokemon-item { display: flex; align-items: center; gap: 10px; padding: 8px 1rem; cursor: pointer; border-bottom: 1px solid rgba(42,47,61,0.5); transition: background 0.15s; position: relative; }
  .pokemon-item:hover { background: var(--surface2); }
  .pokemon-item.selected { background: rgba(247,201,72,0.08); border-left: 3px solid var(--accent); }
  .pokemon-sprite { width: 40px; height: 40px; image-rendering: pixelated; flex-shrink: 0; }
  .pokemon-item-info { flex: 1; min-width: 0; }
  .pokemon-item-name { font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .pokemon-item-number { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--muted); }
  .type-badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .type-badge { padding: 1px 6px; border-radius: 3px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .main-panel { overflow-y: auto; background: var(--bg); }
  .main-panel::-webkit-scrollbar { width: 6px; }
  .main-panel::-webkit-scrollbar-track { background: transparent; }
  .main-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); gap: 12px; }
  .empty-icon { font-size: 4rem; opacity: 0.3; }
  .empty-state p { font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; }
  .detail-header { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border-bottom: 1px solid var(--border); padding: 2rem; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 2rem; position: relative; overflow: hidden; }
  .detail-header::before { content: ''; position: absolute; right: -40px; top: -40px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(247,201,72,0.06) 0%, transparent 70%); pointer-events: none; }
  .detail-sprite { width: 120px; height: 120px; image-rendering: pixelated; filter: drop-shadow(0 4px 16px rgba(247,201,72,0.3)); animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .detail-number { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
  .detail-name { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 4px; color: var(--text); line-height: 1; margin-bottom: 8px; }
  .detail-types { display: flex; gap: 8px; margin-top: 8px; }
  .type-badge-lg { padding: 4px 14px; border-radius: 4px; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .detail-meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; font-size: 0.85rem; }
  .meta-item { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; }
  .meta-label { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
  .meta-value { font-weight: 700; color: var(--text); font-size: 0.95rem; }
  .detail-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 2rem; }
  .tab-btn { padding: 14px 20px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; margin-bottom: -1px; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { padding: 2rem; display: none; }
  .tab-content.active { display: block; }
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
  .ev-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; grid-column: span 2; }
  .ev-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
  .ev-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 3px; color: var(--accent); }
  .ev-total { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: var(--muted); }
  .ev-total span { color: var(--accent); }
  .stat-row { display: grid; grid-template-columns: 80px 50px 1fr 60px; align-items: center; gap: 12px; margin-bottom: 14px; }
  .stat-label { font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .stat-base { font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; text-align: right; font-weight: 700; }
  .stat-bar-wrap { height: 8px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
  .stat-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .stat-total { font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; text-align: right; font-weight: 700; color: var(--accent); }
  .ev-slider-wrap { display: grid; grid-template-columns: 80px 50px 1fr 50px; align-items: center; gap: 10px; margin-bottom: 10px; }
  .ev-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .ev-value-display { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; text-align: right; color: var(--text); }
  input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: var(--border); outline: none; cursor: pointer; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; transition: transform 0.15s; }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
  .ev-input { width: 50px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; padding: 3px 6px; text-align: center; outline: none; }
  .ev-input:focus { border-color: var(--accent); }
  .reset-evs { background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.3); color: var(--red); font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 6px 16px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .reset-evs:hover { background: rgba(255,82,82,0.2); }
  .stat-visual-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; grid-column: span 2; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 3px; color: var(--accent); margin-bottom: 1.2rem; }
  .moves-filters { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .method-filter { padding: 6px 16px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .method-filter:hover { border-color: var(--accent); color: var(--accent); }
  .method-filter.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .moves-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  thead tr { background: var(--surface2); border-bottom: 2px solid var(--border); }
  th { padding: 10px 14px; text-align: left; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  td { padding: 9px 14px; border-bottom: 1px solid rgba(42,47,61,0.5); vertical-align: middle; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody tr:last-child td { border-bottom: none; }
  .move-name { font-weight: 700; color: var(--text); text-transform: capitalize; white-space: nowrap; }
  .move-level { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: var(--accent); }
  .move-power, .move-acc, .move-pp { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: var(--text); }
  .move-cat { padding: 2px 8px; border-radius: 3px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; }
  .cat-physical { background: rgba(255,152,0,0.15); color: #ff9800; }
  .cat-special  { background: rgba(33,150,243,0.15); color: #2196f3; }
  .cat-status   { background: rgba(156,39,176,0.15); color: #9c27b0; }
  .dash { color: var(--muted); }
  .loading { display: flex; align-items: center; justify-content: center; padding: 4rem; color: var(--muted); gap: 12px; font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; letter-spacing: 2px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { padding: 2rem; color: var(--red); font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; text-align: center; letter-spacing: 1px; }
  .type-normal   { background: #9e9e9e; color: #000; }
  .type-fire     { background: #f44336; color: #fff; }
  .type-water    { background: #2196f3; color: #fff; }
  .type-grass    { background: #4caf50; color: #fff; }
  .type-electric { background: #ffeb3b; color: #000; }
  .type-ice      { background: #80deea; color: #000; }
  .type-fighting { background: #bf360c; color: #fff; }
  .type-poison   { background: #9c27b0; color: #fff; }
  .type-ground   { background: #a1887f; color: #fff; }
  .type-flying   { background: #7986cb; color: #fff; }
  .type-psychic  { background: #e91e63; color: #fff; }
  .type-bug      { background: #8bc34a; color: #000; }
  .type-rock     { background: #795548; color: #fff; }
  .type-ghost    { background: #512da8; color: #fff; }
  .type-dragon   { background: #1565c0; color: #fff; }
  .type-dark     { background: #37474f; color: #fff; }
  .type-steel    { background: #78909c; color: #fff; }
  .type-fairy    { background: #f48fb1; color: #000; }
  .type-stellar  { background: #9b59b6; color: #fff; }
  .stat-hp    { --c: var(--hp); }
  .stat-attack { --c: var(--atk); }
  .stat-defense { --c: var(--def); }
  .stat-special-attack { --c: var(--spatk); }
  .stat-special-defense { --c: var(--spdef); }
  .stat-speed { --c: var(--spe); }
  .nature-select-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 1.2rem; flex-wrap: wrap; }
  .nature-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 600; padding: 6px 12px; outline: none; cursor: pointer; transition: border-color 0.2s; }
  .nature-select:focus { border-color: var(--accent); }
  .level-wrap { display: flex; align-items: center; gap: 10px; }
  .level-input { width: 60px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; padding: 6px 10px; text-align: center; outline: none; }
  .level-input:focus { border-color: var(--accent); }
  .gen-tag { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; }
  .mega-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; background: rgba(247,201,72,0.15); color: var(--accent); border: 1px solid rgba(247,201,72,0.3); margin-left: 4px; }
  .pokemon-item.is-mega { border-left: 2px solid rgba(247,201,72,0.4); }
  .pokemon-item.is-mega .pokemon-item-name { color: var(--accent); }

  /* ── Speed Tiers ─────────────────────────────────────────────────────────── */
  .speed-tier-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px;
  }
  .speed-tier-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 3px; color: var(--spe); }
  .speed-tier-legend {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--muted);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .speed-loading-bar {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    height: 6px; margin-bottom: 1.5rem; overflow: hidden;
  }
  .speed-loading-fill {
    height: 100%; background: linear-gradient(90deg, var(--spe), var(--accent));
    border-radius: 6px; transition: width 0.3s ease;
  }
  .speed-loading-label {
    font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: var(--muted);
    margin-bottom: 6px; letter-spacing: 1px;
  }
  .speed-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
  .speed-table-wrap table { width: 100%; }
  .speed-rank {
    font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
    color: var(--muted); text-align: right; width: 40px;
  }
  .speed-pokemon-cell { display: flex; align-items: center; gap: 8px; }
  .speed-mini-sprite { width: 32px; height: 32px; image-rendering: pixelated; }
  .speed-name { font-weight: 700; color: var(--text); }
  .speed-base { font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; color: var(--muted); }
  .speed-val { font-family: 'Share Tech Mono', monospace; font-size: 0.95rem; font-weight: 700; color: var(--spe); }
  .speed-scarf { font-family: 'Share Tech Mono', monospace; font-size: 0.95rem; font-weight: 700; color: #ff9800; }
  .speed-bar-cell { width: 180px; }
  .speed-bar-bg { height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
  .speed-bar-inner { height: 100%; border-radius: 3px; background: var(--spe); transition: width 0.4s; }
  .speed-bar-scarf { background: #ff9800; }
  .speed-tier-row { transition: background 0.15s; }
  .speed-tier-row:hover { background: rgba(255,255,255,0.03); }
  .speed-tier-row.is-selected { background: rgba(255,235,59,0.08) !important; }
  .speed-tier-row.is-selected .speed-name { color: var(--accent); }
  .speed-tier-row.is-faster-base { }
  .speed-tier-row.is-slower-base { opacity: 0.55; }
  .speed-search { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 500; outline: none; transition: border-color 0.2s; width: 200px; }
  .speed-search:focus { border-color: var(--spe); }
  .speed-search::placeholder { color: var(--muted); }
  .tier-divider { height: 1px; background: rgba(255,235,59,0.2); }
  .tier-divider td { padding: 0 !important; }
  .tier-badge {
    display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 0.65rem;
    font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    background: rgba(255,235,59,0.15); color: var(--spe); border: 1px solid rgba(255,235,59,0.2);
  }
  .scarf-badge {
    background: rgba(255,152,0,0.15); color: #ff9800; border-color: rgba(255,152,0,0.2);
  }
  .selected-marker {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 4px; vertical-align: middle;
  }
  .speed-toggle-group {
    display: flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  }
  .speed-toggle {
    padding: 7px 14px; background: transparent; border: none; border-right: 1px solid var(--border);
    color: var(--muted); font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .speed-toggle:last-child { border-right: none; }
  .speed-toggle:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .speed-toggle.active-pos { background: rgba(255,235,59,0.15); color: var(--spe); }
  .speed-toggle.active-neu { background: rgba(255,255,255,0.08); color: var(--text); }
  .speed-toggle.active-neg { background: rgba(255,82,82,0.12); color: var(--red); }
  .scarf-toggle {
    display: flex; align-items: center; gap: 8px; padding: 7px 14px;
    background: transparent; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  }
  .scarf-toggle:hover { border-color: #ff9800; color: #ff9800; }
  .scarf-toggle.active { background: rgba(255,152,0,0.15); border-color: #ff9800; color: #ff9800; }
  .speed-col-scarf { transition: opacity 0.2s; }
  .speed-col-scarf.hidden { opacity: 0.25; }
  .summary-stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; min-width: 90px; text-align: center;
  }
  .summary-stat-label { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .summary-stat-value { font-family: 'Share Tech Mono', monospace; font-size: 1.15rem; font-weight: 700; line-height: 1; }
  .summary-stat-value.pos { color: var(--spe); }
  .summary-stat-value.neu { color: var(--text); }
  .summary-stat-value.neg { color: var(--red); }
  .summary-stat-value.scarf-pos { color: #ff9800; }
  .summary-stat-value.scarf-neu { color: #ffb74d; }
  .summary-stat-value.scarf-neg { color: #e57373; }
</style>
</head>
<body>
<script src="champions-roster.js"></script>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <h1>Pokédex</h1>
      <span>Champions Resource</span>
    </div>
  </div>
  <div class="header-meta">
    <div>Game: <strong>Pokémon Champions</strong></div>
    <div id="headerCount" style="margin-top:2px;">Loading...</div>
  </div>
</header>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-search">
      <input type="text" class="search-box" id="searchInput" placeholder="Search Pokémon…" />
      <div class="filter-row" id="typeFilters"></div>
    </div>
    <div class="pokemon-count" id="countDisplay">Loading…</div>
    <div class="pokemon-list" id="pokemonList">
      <div class="loading"><div class="spinner"></div> LOADING ROSTER</div>
    </div>
  </aside>
  <main class="main-panel" id="mainPanel">
    <div class="empty-state">
      <div class="empty-icon">⚡</div>
      <p>Select a Pokémon to view details</p>
    </div>
  </main>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  allPokemon: [],   // from CHAMPIONS_ROSTER
  filtered: [],
  selected: null,
  evs: { hp:0, attack:0, defense:0, 'special-attack':0, 'special-defense':0, speed:0 },
  ivs: { hp:31, attack:31, defense:31, 'special-attack':31, 'special-defense':31, speed:31 },
  level: 50,
  nature: 'hardy',
  activeTab: 'stats',
  activeMethod: 'all',
  activeTypeFilter: null,
  pokemonCache: {},
};

const STAT_KEYS = ['hp','attack','defense','special-attack','special-defense','speed'];
const STAT_LABELS = { hp:'HP', attack:'ATK', defense:'DEF', 'special-attack':'SP.ATK', 'special-defense':'SP.DEF', speed:'SPD' };
const STAT_MAX = 255;
const NATURES = {
  hardy:[null,null], bashful:[null,null], docile:[null,null], quirky:[null,null], serious:[null,null],
  lonely:['attack','defense'], brave:['attack','speed'], adamant:['attack','special-attack'], naughty:['attack','special-defense'],
  bold:['defense','attack'], relaxed:['defense','speed'], impish:['defense','special-attack'], lax:['defense','special-defense'],
  timid:['speed','attack'], hasty:['speed','defense'], jolly:['speed','special-attack'], naive:['speed','special-defense'],
  modest:['special-attack','attack'], mild:['special-attack','defense'], quiet:['special-attack','speed'], rash:['special-attack','special-defense'],
  calm:['special-defense','attack'], gentle:['special-defense','defense'], sassy:['special-defense','speed'], careful:['special-defense','special-attack'],
};
const ALL_TYPES = ['fire','water','grass','electric','ice','fighting','poison','ground','flying','psychic','bug','rock','ghost','dragon','dark','steel','fairy','normal'];

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  state.allPokemon = CHAMPIONS_ROSTER;
  state.filtered = [...state.allPokemon];
  const megaCount = CHAMPIONS_ROSTER.filter(p => p.isMega).length;
  const baseCount = CHAMPIONS_ROSTER.length - megaCount;
  document.getElementById('headerCount').textContent = `${baseCount} Pokémon · ${megaCount} Megas`;
  renderList();
  buildTypeFilters();
  document.getElementById('searchInput').addEventListener('input', e => applyFilters(e.target.value));
});

// ── Fetch helpers ─────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('fetch failed: ' + url);
  return r.json();
}

async function loadPokemonDetail(entry) {
  const key = entry.name;
  if (state.pokemonCache[key]) return state.pokemonCache[key];

  // Champions-original Megas: build a synthetic data object from hardcoded stats
  if (entry.isMega && entry.stats) {
    const base = state.pokemonCache[entry.name.replace('-mega','').replace('-mega-x','').replace('-mega-y','')] || null;
    const synthetic = {
      id: entry.id,
      name: entry.name,
      height: base?.height || 0,
      weight: base?.weight || 0,
      base_experience: base?.base_experience || null,
      abilities: base?.abilities || [],
      types: base?.types || [],
      sprites: base?.sprites || { other: {} },
      moves: base?.moves || [],
      stats: STAT_KEYS.map(k => ({ stat: { name: k }, base_stat: entry.stats[k] || 0 })),
    };
    state.pokemonCache[key] = synthetic;
    return synthetic;
  }

  const data = await fetchJSON(`https://pokeapi.co/api/v2/pokemon/${key}`);
  state.pokemonCache[key] = data;
  return data;
}

// ── Type filter ───────────────────────────────────────────────────────────────
function buildTypeFilters() {
  const wrap = document.getElementById('typeFilters');
  const all = document.createElement('button');
  all.className = 'type-filter active';
  all.textContent = 'All';
  all.onclick = () => setTypeFilter(null, all);
  wrap.appendChild(all);
  ALL_TYPES.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'type-filter';
    btn.textContent = t;
    btn.onclick = () => setTypeFilter(t, btn);
    wrap.appendChild(btn);
  });
}

function setTypeFilter(type, btn) {
  state.activeTypeFilter = type;
  document.querySelectorAll('.type-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters(search = document.getElementById('searchInput').value) {
  const q = search.toLowerCase().trim();
  let list = state.allPokemon;
  if (q) list = list.filter(p => p.displayName.toLowerCase().includes(q) || p.name.includes(q) || String(p.id).includes(q));
  if (state.activeTypeFilter) {
    list = list.filter(p => {
      const cached = state.pokemonCache[p.name];
      if (!cached) return true;
      return cached.types.some(t => t.type.name === state.activeTypeFilter);
    });
  }
  state.filtered = list;
  renderList();
}

// ── Render sidebar ────────────────────────────────────────────────────────────
function spriteUrl(entry) {
  // Try to use the pokemon's id for the sprite - works for most forms
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${entry.id}.png`;
}

function renderList() {
  const container = document.getElementById('pokemonList');
  document.getElementById('countDisplay').textContent = `${state.filtered.length} of ${state.allPokemon.length} Pokémon`;
  if (!state.filtered.length) {
    container.innerHTML = '<div class="error-msg" style="color:var(--muted)">No Pokémon found</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  state.filtered.forEach(p => {
    const item = document.createElement('div');
    const isSel = state.selected?.name === p.name;
    item.className = 'pokemon-item' + (isSel ? ' selected' : '') + (p.isMega ? ' is-mega' : '');
    item.dataset.name = p.name;
    const idStr = String(p.id).padStart(3, '0');
    const cached = state.pokemonCache[p.name];
    const typesHtml = cached
      ? cached.types.map(t => `<span class="type-badge type-${t.type.name}">${t.type.name}</span>`).join('')
      : '';
    const megaTag = p.isMega ? '<span class="mega-badge">Mega</span>' : '';
    item.innerHTML = `
      <img class="pokemon-sprite" src="${spriteUrl(p)}" alt="${p.displayName}" loading="lazy" onerror="this.style.opacity=0.2" />
      <div class="pokemon-item-info">
        <div class="pokemon-item-name">${p.displayName}${megaTag}</div>
        <div class="pokemon-item-number">#${idStr}</div>
        <div class="type-badges">${typesHtml}</div>
      </div>`;
    item.addEventListener('click', () => selectPokemon(p));
    frag.appendChild(item);
  });
  container.innerHTML = '';
  container.appendChild(frag);
}

// ── Select ────────────────────────────────────────────────────────────────────
async function selectPokemon(p) {
  state.selected = p;
  state.evs = { hp:0, attack:0, defense:0, 'special-attack':0, 'special-defense':0, speed:0 };
  state.activeTab = 'stats';
  state.activeMethod = 'all';
  document.querySelectorAll('.pokemon-item').forEach(el => el.classList.toggle('selected', el.dataset.name === p.name));
  document.getElementById('mainPanel').innerHTML = '<div class="loading"><div class="spinner"></div> LOADING DATA</div>';
  try {
    const pokemon = await loadPokemonDetail(p);
    renderDetail(pokemon, p);
    renderList(); // refresh type badges
  } catch(e) {
    document.getElementById('mainPanel').innerHTML = `<div class="error-msg">Failed to load data for "${p.displayName}".<br/>This form may not be in PokéAPI yet.</div>`;
  }
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function renderDetail(pokemon, entry) {
  const panel = document.getElementById('mainPanel');
  const idStr = String(pokemon.id).padStart(3, '0');
  const types = pokemon.types.map(t => t.type.name);
  const sprite = pokemon.sprites.other?.['official-artwork']?.front_default
    || `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemon.id}.png`;
  const stats = {};
  pokemon.stats.forEach(s => { stats[s.stat.name] = s.base_stat; });
  panel.innerHTML = `
    <div class="detail-header">
      <div><img class="detail-sprite" src="${sprite}" alt="${entry.displayName}" /></div>
      <div>
        <div class="detail-number">#${idStr}</div>
        <div class="detail-name">${entry.displayName}</div>
        <div class="detail-types">${types.map(t => `<span class="type-badge-lg type-${t}">${t}</span>`).join('')}</div>
      </div>
      <div class="detail-meta">
        <div class="meta-item"><div class="meta-label">Height</div><div class="meta-value">${(pokemon.height/10).toFixed(1)}m</div></div>
        <div class="meta-item"><div class="meta-label">Weight</div><div class="meta-value">${(pokemon.weight/10).toFixed(1)}kg</div></div>
        <div class="meta-item"><div class="meta-label">Base Exp</div><div class="meta-value">${pokemon.base_experience ?? '—'}</div></div>
        <div class="meta-item"><div class="meta-label">Abilities</div><div class="meta-value" style="font-size:0.78rem;text-transform:capitalize">${pokemon.abilities.map(a=>a.ability.name.replace(/-/g,' ')).join(', ')}</div></div>
      </div>
    </div>
    <div class="detail-tabs">
      <button class="tab-btn active" onclick="switchTab('stats',this)">Stats & EVs</button>
      <button class="tab-btn" onclick="switchTab('moves',this)">Moves</button>
      <button class="tab-btn" onclick="switchTab('speed',this)">Speed Tiers</button>
    </div>
    <div id="tab-stats" class="tab-content active">${renderStatsTab(stats)}</div>
    <div id="tab-moves" class="tab-content">${renderMovesTab(pokemon)}</div>
    <div id="tab-speed" class="tab-content">${renderSpeedTab(stats)}</div>`;
  attachEVListeners(stats);
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

// ── Stats tab ─────────────────────────────────────────────────────────────────
function renderStatsTab(stats) {
  const natOptions = Object.keys(NATURES).map(n =>
    `<option value="${n}" ${n===state.nature?'selected':''}>${n.charAt(0).toUpperCase()+n.slice(1)}</option>`).join('');
  const statBars = STAT_KEYS.map(key => {
    const base = stats[key] || 0;
    const total = calcStat(key, base);
    const pct = Math.min(100,(base/STAT_MAX)*100).toFixed(1);
    return `<div class="stat-row stat-${key}">
      <div class="stat-label" style="color:var(--c)">${STAT_LABELS[key]}</div>
      <div class="stat-base">${base}</div>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:var(--c)" id="bar-${key}"></div></div>
      <div class="stat-total" id="total-${key}">${total}</div>
    </div>`;
  }).join('');
  const evSliders = STAT_KEYS.map(key => `
    <div class="ev-slider-wrap">
      <div class="ev-label">${STAT_LABELS[key]}</div>
      <div class="ev-value-display" id="ev-display-${key}">0</div>
      <input type="range" min="0" max="32" step="1" value="0" id="ev-slider-${key}" />
      <input type="number" min="0" max="32" step="1" value="0" class="ev-input" id="ev-input-${key}" />
    </div>`).join('');
  return `<div class="stats-grid">
    <div class="stat-visual-section">
      <div class="section-title">Base Stats</div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:1rem;flex-wrap:wrap">
        <div class="level-wrap">
          <span style="font-size:0.8rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase">Level</span>
          <input type="number" min="1" max="100" value="${state.level}" class="level-input" id="levelInput"
            onchange="state.level=Math.max(1,Math.min(100,+this.value));updateAllTotals()" />
        </div>
        <div class="nature-select-wrap" style="margin-bottom:0">
          <span style="font-size:0.8rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase">Nature</span>
          <select class="nature-select" id="natureSelect" onchange="state.nature=this.value;updateAllTotals()">
            ${natOptions}
          </select>
        </div>
      </div>
      ${statBars}
    </div>
    <div class="ev-section">
      <div class="ev-header">
        <div class="ev-title">Stat Points</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="ev-total">Total: <span id="evTotal">0</span> / 66</div>
          <button class="reset-evs" onclick="resetEVs()">Reset</button>
        </div>
      </div>
      ${evSliders}
    </div>
  </div>`;
}
function calcStat(key, base) {
  const sp = state.evs[key] || 0;

  const nat = NATURES[state.nature] || [null,null];
  let mult = 1;
  if (nat[0] === key) mult = 1.1;
  if (nat[1] === key) mult = 0.9;
  if (key === 'hp') return Math.floor((2*base+31)*50/100) + 60 + sp;
  return Math.floor((Math.floor((2*base+31)*50/100) + 5 + sp) * mult);
}

function updateAllTotals() {
  const pokemon = state.pokemonCache[state.selected?.name];
  if (!pokemon) return;
  const stats = {};
  pokemon.stats.forEach(s => { stats[s.stat.name] = s.base_stat; });
  STAT_KEYS.forEach(key => {
    const el = document.getElementById('total-' + key);
    if (el) el.textContent = calcStat(key, stats[key] || 0);
  });
  updateEVTotal();
}

function updateEVTotal() {
  const total = STAT_KEYS.reduce((a,k)=>a+(state.evs[k]||0),0);
  const el = document.getElementById('evTotal');
  if (el) el.textContent = total;
  return total;
}

function resetEVs() {
  STAT_KEYS.forEach(key => {
    state.evs[key] = 0;
    ['ev-slider-','ev-input-'].forEach(p => { const e = document.getElementById(p+key); if(e) e.value = 0; });
    const d = document.getElementById('ev-display-'+key); if(d) d.textContent = 0;
  });
  updateAllTotals();
}

function attachEVListeners(stats) {
  STAT_KEYS.forEach(key => {
    const slider = document.getElementById('ev-slider-'+key);
    const input  = document.getElementById('ev-input-'+key);
    const disp   = document.getElementById('ev-display-'+key);
    const update = val => {
      val = Math.max(0,Math.min(32,Math.round(val)));
      const rest = STAT_KEYS.reduce((a,k)=>a+(k===key?0:(state.evs[k]||0)),0);
      val = Math.min(val, 66 - rest);
      state.evs[key] = val;
      if(slider) slider.value = val;
      if(input)  input.value  = val;
      if(disp)   disp.textContent = val;
      const el = document.getElementById('total-'+key);
      if(el) el.textContent = calcStat(key, stats[key]||0);
      updateEVTotal();
    };
    if(slider) slider.addEventListener('input', e => update(+e.target.value));
    if(input)  input.addEventListener('change', e => update(+e.target.value));
  });
}

// ── Moves tab ─────────────────────────────────────────────────────────────────
function renderMovesTab(pokemon) {
  const methods = new Set(['all']);
  pokemon.moves.forEach(m => m.version_group_details.forEach(d => methods.add(d.move_learn_method.name)));
  const methodBtns = [...methods].map(m =>
    `<button class="method-filter ${m===state.activeMethod?'active':''}" onclick="filterMoves('${m}',this)">${m.replace(/-/g,' ')}</button>`).join('');
  return `<div class="moves-filters" id="moveFilters">${methodBtns}</div>
    <div class="moves-table-wrap" id="movesTable">${buildMoveRows(pokemon.moves, state.activeMethod)}</div>`;
}

function filterMoves(method, btn) {
  state.activeMethod = method;
  document.querySelectorAll('#moveFilters .method-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const pokemon = state.pokemonCache[state.selected?.name];
  if (pokemon) document.getElementById('movesTable').innerHTML = buildMoveRows(pokemon.moves, method);
}

function buildMoveRows(moves, method) {
  let filtered = method === 'all' ? moves : moves.filter(m => m.version_group_details.some(d => d.move_learn_method.name === method));
  if (!filtered.length) return '<div class="loading" style="padding:2rem;color:var(--muted)">No moves for this method.</div>';
  filtered = [...filtered].sort((a,b) => {
    if (method === 'level-up') {
      const al = a.version_group_details.find(d=>d.move_learn_method.name==='level-up')?.level_learned_at||0;
      const bl = b.version_group_details.find(d=>d.move_learn_method.name==='level-up')?.level_learned_at||0;
      return al - bl;
    }
    return a.move.name.localeCompare(b.move.name);
  });
  const rows = filtered.map(m => {
    const detail = m.version_group_details.find(d=>d.move_learn_method.name===method) || m.version_group_details[0];
    const level = detail?.level_learned_at || 0;
    const moveName = m.move.name.replace(/-/g,' ');
    const cached = window._moveCache?.[m.move.name];
    if (cached) return moveRow(moveName, level, cached, method);
    loadMoveDetail(m.move.name, m.move.url);
    return `<tr id="move-row-${m.move.name}">
      <td class="move-name">${moveName}</td>
      <td class="move-level">${method==='level-up'?(level||'Evo'):'—'}</td>
      <td><span class="type-badge type-normal" id="movetype-${m.move.name}">…</span></td>
      <td class="dash">…</td><td class="dash">—</td><td class="dash">—</td><td class="dash">—</td></tr>`;
  }).join('');
  return `<table><thead><tr><th>Move</th><th>Level</th><th>Type</th><th>Category</th><th>Power</th><th>Accuracy</th><th>PP</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function moveRow(moveName, level, data, method) {
  const cat = data.damage_class?.name||'status', type = data.type?.name||'normal';
  return `<tr>
    <td class="move-name">${moveName}</td>
    <td class="move-level">${method==='level-up'?(level||'Evo'):'—'}</td>
    <td><span class="type-badge type-${type}">${type}</span></td>
    <td><span class="move-cat cat-${cat}">${cat}</span></td>
    <td class="move-power">${data.power??'<span class="dash">—</span>'}</td>
    <td class="move-acc">${data.accuracy??'<span class="dash">—</span>'}</td>
    <td class="move-pp">${data.pp??'<span class="dash">—</span>'}</td></tr>`;
}

// ── Speed Tiers ───────────────────────────────────────────────────────────────
window._speedData = {};           // name -> { base, displayName, id }
window._speedLoaded = 0;
window._speedTotal = 0;
window._speedLoadingActive = false;
window._speedNature = 'pos';      // 'pos' | 'neu' | 'neg'
window._scarfEnabled = true;

// Speed stat calc at L50, 31 IVs, 252 EVs, with nature multiplier
function calcSpeedVal(base, natureMult) {
  return Math.floor((Math.floor((2*base+31)*50/100) + 5 + 32) * natureMult);
}
function getSpeedForNature(base, nature) {
  const mult = nature === 'pos' ? 1.1 : nature === 'neg' ? 0.9 : 1.0;
  return calcSpeedVal(base, mult);
}
function getScarfSpeed(base, nature) {
  return Math.floor(getSpeedForNature(base, nature) * 1.5);
}

// Kick off background loading of all roster speed stats
async function initSpeedData() {
  if (window._speedLoadingActive) return;
  window._speedLoadingActive = true;
  const roster = CHAMPIONS_ROSTER;
  window._speedTotal = roster.length;
  window._speedLoaded = 0;
  const BATCH = 8;
  for (let i = 0; i < roster.length; i += BATCH) {
    const slice = roster.slice(i, i + BATCH);
    await Promise.all(slice.map(async entry => {
      if (window._speedData[entry.name]) { window._speedLoaded++; updateSpeedProgress(); return; }

      // Use hardcoded stats if available (Champions-original Megas)
      if (entry.stats) {
        window._speedData[entry.name] = { base: entry.stats.speed, displayName: entry.displayName, id: entry.id, isMega: entry.isMega };
        window._speedLoaded++;
        updateSpeedProgress();
        return;
      }

      let data = state.pokemonCache[entry.name];
      if (!data) {
        try {
          data = await fetchJSON(`https://pokeapi.co/api/v2/pokemon/${entry.name}`);
          state.pokemonCache[entry.name] = data;
        } catch(e) { window._speedLoaded++; updateSpeedProgress(); return; }
      }
      const spe = data.stats.find(s => s.stat.name === 'speed');
      if (spe) window._speedData[entry.name] = { base: spe.base_stat, displayName: entry.displayName, id: entry.id, isMega: !!entry.isMega };
      window._speedLoaded++;
      updateSpeedProgress();
    }));
  }
  updateSpeedProgress();
  if (document.getElementById('tab-speed')?.classList.contains('active')) refreshSpeedTable();
}

function updateSpeedProgress() {
  const bar   = document.getElementById('speedLoadFill');
  const label = document.getElementById('speedLoadLabel');
  if (bar)   bar.style.width = Math.round((window._speedLoaded / window._speedTotal) * 100) + '%';
  if (label) label.textContent = window._speedLoaded >= window._speedTotal
    ? `ALL ${window._speedTotal} POKÉMON LOADED`
    : `LOADING… ${window._speedLoaded} / ${window._speedTotal}`;
  if (window._speedLoaded >= window._speedTotal) refreshSpeedTable();
}

function refreshSpeedTable() {
  const container = document.getElementById('speedTierTableWrap');
  if (!container) return;
  const pokemon = state.pokemonCache[state.selected?.name];
  if (!pokemon) return;
  const myBaseSpe = pokemon.stats.find(s => s.stat.name === 'speed')?.base_stat ?? 0;
  container.innerHTML = buildSpeedTable(myBaseSpe, document.getElementById('speedSearch')?.value || '');
  updateSummaryCards(myBaseSpe);
}

function updateSummaryCards(base) {
  const nat = window._speedNature;
  const spd = getSpeedForNature(base, nat);
  const scarf = getScarfSpeed(base, nat);
  const posSpd = getSpeedForNature(base, 'pos');
  const neuSpd = getSpeedForNature(base, 'neu');
  const negSpd = getSpeedForNature(base, 'neg');

  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('sum-pos-spd',  posSpd);
  set('sum-neu-spd',  neuSpd);
  set('sum-neg-spd',  negSpd);
  set('sum-pos-scarf', getScarfSpeed(base, 'pos'));
  set('sum-neu-scarf', getScarfSpeed(base, 'neu'));
  set('sum-neg-scarf', getScarfSpeed(base, 'neg'));
}

function setSpeedNature(nat) {
  window._speedNature = nat;
  // Update toggle buttons
  ['pos','neu','neg'].forEach(n => {
    const btn = document.getElementById('natbtn-' + n);
    if (btn) { btn.className = 'speed-toggle' + (n === nat ? ' active-' + n : ''); }
  });
  refreshSpeedTable();
}

function toggleScarf() {
  window._scarfEnabled = !window._scarfEnabled;
  const btn = document.getElementById('scarfToggleBtn');
  if (btn) btn.className = 'scarf-toggle' + (window._scarfEnabled ? ' active' : '');
  // Show/hide scarf column cells
  document.querySelectorAll('.speed-col-scarf').forEach(el => {
    el.classList.toggle('hidden', !window._scarfEnabled);
  });
  refreshSpeedTable();
}

function renderSpeedTab(stats) {
  const myBaseSpe = stats['speed'] || 0;
  const loaded = window._speedLoaded;
  const total  = window._speedTotal || CHAMPIONS_ROSTER.length;
  const pct    = total > 0 ? Math.round((loaded / total) * 100) : 0;
  if (!window._speedLoadingActive) initSpeedData();

  const natActive = window._speedNature;
  const scarfOn   = window._scarfEnabled;

  return `
    <div class="speed-tier-header">
      <div>
        <div class="speed-tier-title">Speed Tiers</div>
        <div style="font-size:0.78rem;color:var(--muted);margin-top:2px">252 EVs · 31 IVs · Lv 50 · Nature selectable below</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input class="speed-search" id="speedSearch" placeholder="Filter Pokémon…" oninput="refreshSpeedTable()" />
        <div class="speed-tier-legend">
          <span><span class="legend-dot" style="background:var(--accent)"></span>Selected</span>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:10px;align-items:center;margin-bottom:1rem;flex-wrap:wrap">
      <div style="font-size:0.75rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap">Nature:</div>
      <div class="speed-toggle-group">
        <button class="speed-toggle ${natActive==='pos'?'active-pos':''}" id="natbtn-pos" onclick="setSpeedNature('pos')">▲ +Spe</button>
        <button class="speed-toggle ${natActive==='neu'?'active-neu':''}" id="natbtn-neu" onclick="setSpeedNature('neu')">● Neutral</button>
        <button class="speed-toggle ${natActive==='neg'?'active-neg':''}" id="natbtn-neg" onclick="setSpeedNature('neg')">▼ −Spe</button>
      </div>
      <button class="scarf-toggle ${scarfOn?'active':''}" id="scarfToggleBtn" onclick="toggleScarf()">
        <span class="scarf-dot"></span> 🧣 Choice Scarf
      </button>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap;align-items:stretch">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;display:flex;flex-direction:column;gap:2px;justify-content:center">
        <div style="font-size:0.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase">Selected</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:1.1rem;color:var(--accent);font-weight:700">${state.selected?.displayName || '—'}</div>
        <div style="font-size:0.7rem;color:var(--muted)">Base SPD: ${myBaseSpe}</div>
      </div>
      <div class="summary-stat-card">
        <div class="summary-stat-label" style="color:var(--spe)">▲ +Spe Speed</div>
        <div class="summary-stat-value pos" id="sum-pos-spd">${getSpeedForNature(myBaseSpe,'pos')}</div>
        <div class="summary-stat-label scarf-pos" style="margin-top:6px;color:#ff9800">🧣 Scarf</div>
        <div class="summary-stat-value scarf-pos" id="sum-pos-scarf">${getScarfSpeed(myBaseSpe,'pos')}</div>
      </div>
      <div class="summary-stat-card">
        <div class="summary-stat-label">● Neutral Speed</div>
        <div class="summary-stat-value neu" id="sum-neu-spd">${getSpeedForNature(myBaseSpe,'neu')}</div>
        <div class="summary-stat-label" style="margin-top:6px;color:#ffb74d">🧣 Scarf</div>
        <div class="summary-stat-value scarf-neu" id="sum-neu-scarf">${getScarfSpeed(myBaseSpe,'neu')}</div>
      </div>
      <div class="summary-stat-card">
        <div class="summary-stat-label" style="color:var(--red)">▼ −Spe Speed</div>
        <div class="summary-stat-value neg" id="sum-neg-spd">${getSpeedForNature(myBaseSpe,'neg')}</div>
        <div class="summary-stat-label" style="margin-top:6px;color:#e57373">🧣 Scarf</div>
        <div class="summary-stat-value scarf-neg" id="sum-neg-scarf">${getScarfSpeed(myBaseSpe,'neg')}</div>
      </div>
    </div>

    <div class="speed-loading-label" id="speedLoadLabel">${loaded >= total ? `ALL ${total} POKÉMON LOADED` : `LOADING… ${loaded} / ${total}`}</div>
    <div class="speed-loading-bar" style="margin-bottom:1rem"><div class="speed-loading-fill" id="speedLoadFill" style="width:${pct}%"></div></div>

    <div class="speed-table-wrap" id="speedTierTableWrap">
      ${buildSpeedTable(myBaseSpe, '')}
    </div>`;
}

function buildSpeedTable(myBaseSpe, filter) {
  const q      = (filter || document.getElementById('speedSearch')?.value || '').toLowerCase().trim();
  const nat    = window._speedNature;
  const scarfOn = window._scarfEnabled;

  let entries = Object.entries(window._speedData)
    .map(([name, d]) => ({
      name,
      ...d,
      spd:   getSpeedForNature(d.base, nat),
      scarf: getScarfSpeed(d.base, nat),
    }))
    .sort((a, b) => b.spd - a.spd);

  if (q) entries = entries.filter(e => e.displayName.toLowerCase().includes(q) || String(e.base).includes(q));

  if (!entries.length) return '<div class="loading" style="padding:2rem;color:var(--muted)">No data yet — loading in background…</div>';

  const maxPossible = entries[0]?.spd || 1;
  const selectedName = state.selected?.name;

  const natColor = nat === 'pos' ? 'var(--spe)' : nat === 'neg' ? 'var(--red)' : 'var(--text)';
  const natLabel = nat === 'pos' ? '▲ +Spe' : nat === 'neg' ? '▼ −Spe' : '● Neutral';
  const scarfColor = nat === 'pos' ? '#ff9800' : nat === 'neg' ? '#e57373' : '#ffb74d';

  const rows = entries.map((e, i) => {
    const isSelected = e.name === selectedName;
    const barPct   = ((e.spd   / maxPossible) * 100).toFixed(1);
    const scarfPct = Math.min(100, ((e.scarf / maxPossible) * 100)).toFixed(1);
    const marker = isSelected ? '<span class="selected-marker"></span>' : '';
    const megaTag = e.isMega ? ' <span class="mega-badge">Mega</span>' : '';

    const scarfCell = scarfOn
      ? `<td class="speed-scarf speed-col-scarf" style="color:${scarfColor}">${e.scarf}</td>`
      : `<td class="speed-scarf speed-col-scarf hidden" style="color:${scarfColor}">${e.scarf}</td>`;

    const scarfBar = scarfOn
      ? `<div class="speed-bar-bg" style="margin-top:3px"><div class="speed-bar-inner" style="width:${scarfPct}%;background:${scarfColor}"></div></div>`
      : '';

    return `<tr class="speed-tier-row${isSelected ? ' is-selected' : ''}">
      <td class="speed-rank">${i + 1}</td>
      <td>
        <div class="speed-pokemon-cell">
          <img class="speed-mini-sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${e.id}.png" alt="${e.displayName}" loading="lazy" onerror="this.style.display='none'" />
          <div>
            <div class="speed-name">${marker}${e.displayName}${megaTag}</div>
            <div class="speed-base">Base ${e.base}</div>
          </div>
        </div>
      </td>
      <td class="speed-val" style="color:${natColor}">${e.spd}</td>
      ${scarfCell}
      <td class="speed-bar-cell">
        <div class="speed-bar-bg"><div class="speed-bar-inner" style="width:${barPct}%;background:${natColor}"></div></div>
        ${scarfBar}
      </td>
    </tr>`;
  }).join('');

  const scarfTh = `<th class="speed-col-scarf${scarfOn?'':' hidden'}"><span class="tier-badge scarf-badge">🧣 Scarf</span></th>`;

  return `<table>
    <thead><tr>
      <th>#</th>
      <th>Pokémon</th>
      <th><span class="tier-badge" style="background:rgba(255,235,59,0.1);color:${natColor};border-color:${natColor}40">${natLabel} Speed</span></th>
      ${scarfTh}
      <th style="min-width:180px">Speed Bars</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function filterSpeedTable(val) { refreshSpeedTable(); }

window._moveCache = {};
async function loadMoveDetail(name, url) {
  if (window._moveCache[name]) return;
  try {
    const data = await fetchJSON(url);
    window._moveCache[name] = data;
    const row = document.getElementById('move-row-'+name);
    if (row) {
      const cat = data.damage_class?.name||'status', type = data.type?.name||'normal';
      const lv = row.cells[1].textContent;
      row.innerHTML = `
        <td class="move-name">${name.replace(/-/g,' ')}</td>
        <td class="move-level">${lv}</td>
        <td><span class="type-badge type-${type}">${type}</span></td>
        <td><span class="move-cat cat-${cat}">${cat}</span></td>
        <td class="move-power">${data.power??'<span class="dash">—</span>'}</td>
        <td class="move-acc">${data.accuracy??'<span class="dash">—</span>'}</td>
        <td class="move-pp">${data.pp??'<span class="dash">—</span>'}</td>`;
    }
  } catch(e) { /* silent */ }
}
</script>
